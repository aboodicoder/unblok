<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>❤️</title>
  <style>
    body {
      margin: 0;
      background: black;
    }
  </style>
</head>
<body>

<script>
window.onload = function() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  // 8K resolution
  canvas.width = 7680;
  canvas.height = 4320;

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.imageSmoothingEnabled = false;

  // HEAVIER computation (smaller step)
  const step = 0.0005;

  for (let x = -2; x <= 2; x += step) {
    for (let y = -2; y <= 2; y += step) {
      const formula = Math.pow(x*x + y*y - 1, 3) - x*x*y*y*y;

      if (formula <= 0) {
        const px = (x + 2) * (canvas.width / 4);
        const py = (2 - y) * (canvas.height / 4);

        const dist = Math.sqrt(x*x + y*y);

        const r = 255;
        const g = Math.floor(40 + dist * 100);
        const b = Math.floor(70 + dist * 140);

        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(px, py, 1.2, 1.2);
      }
    }
  }

  // Extra heavy glow passes
  ctx.globalAlpha = 0.05;
  for (let i = 0; i < 15; i++) {
    ctx.drawImage(canvas, -i, -i);
  }
  ctx.globalAlpha = 1;

  // Auto download
  const link = document.createElement('a');
  link.download = "heart-8k-ultra.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
};
</script>

</body>
</html>
